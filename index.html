<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroGota - Calculadora Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>AgroGota 🌾</h1>
        <p>Equilíbrio entre produção e preservação</p>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Simulador de Irrigação</h2>
            <form id="calc-form">
                <label for="cultura">Cultura:</label>
                <select id="cultura" required>
                    <option value="milho">Milho</option>
                    <option value="soja">Soja</option>
                    <option value="hortalicas">Hortaliças</option>
                </select>

                <label for="area">Área da Plantação (em hectares):</label>
                <input type="number" id="area" min="1" placeholder="Ex: 5" required>

                <button type="button" onclick="calcularEconomia()">Calcular Impacto</button>
            </form>
        </section>

        <section id="resultado" class="result-section hidden">
            <h3>Resultado da Simulação</h3>
            <p id="consumo-estimado"></p>
            <p id="economia-gotejamento" class="destaque"></p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
